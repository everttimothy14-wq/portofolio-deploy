<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/experience.css">

<body>
    <aside class="sidebar">
        <h1>Admin</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>

    <main class="content">
        <h2>Experience</h2>
        <form id="experienceForm" class="panel form-grid">
            <input type="hidden" id="itemId">
            <label>Posisi <input id="posisi" required></label>
            <label>Perusahaan <input id="perusahaan" required></label>
            <label>Durasi <input id="durasi" required></label>
            <label>Deskripsi <textarea id="deskripsi"></textarea></label>
            <button type="submit">Simpan</button>
            <button type="button" id="resetBtn">Reset</button>
        </form>
        <section id="experienceList" class="list"></section>
    </main>
    <script src="js/base.js"></script>
    <script src="js/experience.js"></script>
